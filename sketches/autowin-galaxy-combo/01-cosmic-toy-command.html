<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Autowin OS — Cosmic Toy Command</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #05081b;
        color: #f7f4ff;
        font:
          13px Inter,
          Segoe UI,
          sans-serif;
        overflow: hidden;
      }
      .app {
        height: 100vh;
        display: grid;
        grid-template-columns: 210px 1fr;
        background:
          radial-gradient(circle at 75% 8%, #47134b66, transparent 30%),
          radial-gradient(circle at 52% 48%, #15378366, transparent 42%), #05081b;
      }
      .rail {
        border-right: 2px solid #e7b95055;
        padding: 24px 16px;
        background: #06091dcc;
      }
      .brand {
        font: 800 19px Georgia;
        color: #f6d77f;
        letter-spacing: 0.04em;
      }
      .brand b {
        color: #ff5ba8;
      }
      .nav {
        display: grid;
        gap: 7px;
        margin-top: 28px;
      }
      .nav button {
        border: 1px solid transparent;
        border-radius: 10px;
        background: transparent;
        color: #aab9e4;
        padding: 11px;
        text-align: left;
      }
      .nav .active {
        border-color: #e7b950;
        background: linear-gradient(90deg, #e7b95022, #ff5ba814);
        color: #fff;
      }
      .main {
        padding: 24px;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 17px;
      }
      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .eyebrow {
        color: #65c9ff;
        font-size: 10px;
        letter-spacing: 0.18em;
      }
      .top h1 {
        font: 800 28px Georgia;
        margin: 5px 0;
        color: #fff1be;
        text-shadow: 0 0 20px #e7b95055;
      }
      .actions button {
        border: 1px solid #e7b950;
        border-radius: 12px;
        background: #151638;
        color: #f9dc88;
        padding: 10px 15px;
      }
      .actions .pink {
        background: #ff4f9f;
        color: white;
        border-color: #ff8fc3;
        box-shadow: 0 0 22px #ff4f9f55;
      }
      .workspace {
        display: grid;
        grid-template-columns: 260px 1fr 280px;
        gap: 14px;
        min-height: 0;
      }
      .panel {
        border: 1px solid #577de788;
        border-radius: 16px;
        background: linear-gradient(145deg, #101838e8, #090d25e8);
        box-shadow:
          inset 0 0 0 2px #ffffff08,
          0 15px 35px #0008;
        padding: 16px;
        overflow: hidden;
      }
      .panel h3 {
        font: 700 15px Georgia;
        color: #f5d778;
        margin: 0 0 15px;
      }
      .search {
        width: 100%;
        padding: 11px;
        border: 1px solid #5576d4;
        border-radius: 10px;
        background: #080d28;
        color: white;
      }
      .chip {
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 10px;
        margin-top: 7px;
        border: 1px solid #354b91;
        border-radius: 12px;
        background: #121c42;
        color: #cbd5ff;
      }
      .chip i {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #52c8ff;
        box-shadow: 0 0 12px #52c8ff;
      }
      .chip:nth-child(4) i {
        background: #ff58a7;
        box-shadow: 0 0 12px #ff58a7;
      }
      .chip:nth-child(5) i {
        background: #edbd4d;
        box-shadow: 0 0 12px #edbd4d;
      }
      .galaxy {
        position: relative;
        background: radial-gradient(circle at 50% 50%, #173d86, #0a1233 44%, #05071a 78%);
        overflow: hidden;
      }
      .stars {
        position: absolute;
        inset: 0;
        background-image:
          radial-gradient(#fff 1px, transparent 1px), radial-gradient(#5dd6ff 1px, transparent 1px);
        background-size:
          45px 45px,
          73px 73px;
        opacity: 0.32;
      }
      .orbit {
        position: absolute;
        left: 50%;
        top: 52%;
        width: 420px;
        height: 250px;
        border: 1px solid #f1c85d55;
        border-radius: 50%;
        transform: translate(-50%, -50%) rotate(-12deg);
      }
      .node {
        position: absolute;
        padding: 8px 12px;
        border-radius: 16px;
        border: 2px solid currentColor;
        background: #08102ee8;
        font-weight: 700;
        box-shadow: 0 0 20px currentColor;
      }
      .n1 {
        left: 42%;
        top: 42%;
        color: #ffd467;
      }
      .n2 {
        left: 18%;
        top: 30%;
        color: #55d6ff;
      }
      .n3 {
        right: 15%;
        top: 28%;
        color: #ff64ae;
      }
      .n4 {
        left: 27%;
        bottom: 23%;
        color: #8b8fff;
      }
      .n5 {
        right: 26%;
        bottom: 20%;
        color: #f6bc4d;
      }
      .detail .hero {
        border: 1px solid #ff5ba8;
        border-radius: 14px;
        padding: 14px;
        background: #ff4f9f14;
      }
      .detail b {
        color: #ff8fc4;
      }
      .stat {
        display: grid;
        grid-template-columns: 1fr auto;
        padding: 12px 0;
        border-bottom: 1px solid #41528b66;
      }
      .meter {
        height: 9px;
        border-radius: 9px;
        background: #151c3b;
        margin-top: 16px;
        overflow: hidden;
      }
      .meter i {
        display: block;
        width: 74%;
        height: 100%;
        background: linear-gradient(90deg, #51cfff, #ff58a7, #f0c45b);
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="rail">
        <div class="brand">✦ Autowin <b>OS</b></div>
        <div class="nav">
          <button>💬 Chat</button><button class="active">🌐 Memory</button><button>🧩 Agents</button
          ><button>✧ Skills</button><button>⟳ Loops</button>
        </div>
      </aside>
      <main class="main">
        <header class="top">
          <div>
            <div class="eyebrow">COSMIC TOY COMMAND</div>
            <h1>Knowledge Galaxy</h1>
          </div>
          <div class="actions">
            <button>Vue 3D</button> <button class="pink">Lancer le flow ✦</button>
          </div>
        </header>
        <section class="workspace">
          <aside class="panel">
            <h3>Thèmes & fiches</h3>
            <input class="search" placeholder="Rechercher partout…" />
            <div class="chip"><i></i>Architecture</div>
            <div class="chip"><i></i>Agent Studio</div>
            <div class="chip"><i></i>Décisions produit</div>
            <div class="chip"><i></i>Autowin Brain</div>
          </aside>
          <div class="panel galaxy">
            <div class="stars"></div>
            <div class="orbit"></div>
            <span class="node n1">Autowin OS</span><span class="node n2">Brain 3D</span
            ><span class="node n3">Agent Studio</span><span class="node n4">Skills</span
            ><span class="node n5">Loops</span>
          </div>
          <aside class="panel detail">
            <h3>Fiche sélectionnée</h3>
            <div class="hero">
              <b>✦ Agent Studio</b>
              <p>Cockpit de composition des sous-agents et de leurs skills.</p>
            </div>
            <div class="stat"><span>Relations</span><b>24</b></div>
            <div class="stat"><span>Thèmes</span><b>4</b></div>
            <div class="stat"><span>Confiance</span><b>Haute</b></div>
            <div class="meter"><i></i></div>
          </aside>
        </section>
      </main>
    </div>
  </body>
</html>
